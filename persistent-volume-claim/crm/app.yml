apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: Arunk-${ENVIRONMENT}-crm-app-log
spec:
  storageClassName: Arunk-${ENVIRONMENT}-crm-app-log
  volumeName: Arunk-${ENVIRONMENT}-crm-app-log
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
 
