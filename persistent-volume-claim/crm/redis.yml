apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: Arunk-${ENVIRONMENT}-crm-redis-data
spec:
  storageClassName: Arunk-${ENVIRONMENT}-crm-redis-data
  volumeName: Arunk-${ENVIRONMENT}-crm-redis-0-data
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: Arunk-${ENVIRONMENT}-crm-redis-log
spec:
  storageClassName: Arunk-${ENVIRONMENT}-crm-redis-log
  volumeName: Arunk-${ENVIRONMENT}-crm-redis-0-log
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
