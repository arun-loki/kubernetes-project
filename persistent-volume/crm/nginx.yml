apiVersion: v1
kind: PersistentVolume
metadata:
  name: Arunk-${ENVIRONMENT}-crm-nginx-log
spec:
  storageClassName: Arunk-${ENVIRONMENT}-crm-nginx-log
  capacity:
    storage: 2Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  local:
    path: /mnt/Arunk/${ENVIRONMENT}/crm/nginx/log
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
          - key: kubernetes.io/os
            operator: In
            values:
              - linux
 
